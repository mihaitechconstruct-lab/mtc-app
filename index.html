<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mihai Tech Construct</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--bg2:#13161e;--bg3:#1a1e28;--card:#1e2332;--card2:#252b3b;
  --border:#2e3547;--accent:#f59e0b;--accent2:#fbbf24;--accent-dim:rgba(245,158,11,0.12);
  --red:#ef4444;--red-dim:rgba(239,68,68,0.12);
  --green:#22c55e;--green-dim:rgba(34,197,94,0.12);
  --blue:#3b82f6;--blue-dim:rgba(59,130,246,0.12);
  --purple:#a855f7;--purple-dim:rgba(168,85,247,0.12);
  --cyan:#06b6d4;--cyan-dim:rgba(6,182,212,0.12);
  --orange:#f97316;--orange-dim:rgba(249,115,22,0.12);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --radius:14px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,0.4);
  --font:'Barlow',sans-serif;--font-cond:'Barlow Condensed',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text);}
body{display:flex;flex-direction:column;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* HEADER */
.app-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;background:var(--bg2);border-bottom:1px solid var(--border);position:relative;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#000;font-family:var(--font-cond);}
.logo-text{font-family:var(--font-cond);font-size:17px;font-weight:800;letter-spacing:0.5px;line-height:1.1;}
.logo-sub{font-size:10px;font-weight:500;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.header-right{display:flex;gap:8px;align-items:center;}
.header-btn{width:36px;height:36px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2);}

/* CONTENT */
.app-content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:76px;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:stretch;padding:0 4px;padding-bottom:env(safe-area-inset-bottom);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 10px;gap:3px;cursor:pointer;transition:all 0.2s;position:relative;}
.nav-item.active .nav-icon,.nav-item.active .nav-label{color:var(--accent);}
.nav-item.active::before{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;background:var(--accent);border-radius:0 0 4px 4px;}
.nav-icon{font-size:19px;color:var(--text3);transition:color 0.2s;}
.nav-label{font-size:9px;font-weight:600;color:var(--text3);letter-spacing:0.3px;text-transform:uppercase;}

/* PAGES */
.page{display:none;animation:fadeIn 0.22s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

/* SECTION HEADER */
.section-header{padding:18px 16px 10px;}
.section-title{font-family:var(--font-cond);font-size:24px;font-weight:800;letter-spacing:0.5px;}
.section-sub{font-size:13px;color:var(--text3);margin-top:2px;}

/* CARDS */
.card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
.card-body{padding:16px;}
.card-header{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-weight:700;font-size:14px;letter-spacing:0.3px;}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;position:relative;overflow:hidden;cursor:pointer;}
.stat-card::before{content:'';position:absolute;top:-20px;right:-20px;width:70px;height:70px;border-radius:50%;background:var(--sc-bg,var(--accent-dim));}
.stat-icon{font-size:22px;margin-bottom:8px;}
.stat-value{font-family:var(--font-cond);font-size:26px;font-weight:800;line-height:1;}
.stat-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-top:4px;}
.stat-trend{font-size:11px;font-weight:700;margin-top:6px;}

/* INPUTS */
.form-group{margin-bottom:13px;}
.form-label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block;}
.form-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;color:var(--text);font-family:var(--font);font-size:14px;font-weight:500;outline:none;transition:border-color 0.2s;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--text3);}
select.form-input option{background:var(--bg3);}
textarea.form-input{resize:vertical;min-height:64px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:11px 18px;border-radius:var(--radius-sm);border:none;font-family:var(--font);font-size:14px;font-weight:700;letter-spacing:0.3px;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:active{transform:scale(0.97);}
.btn-danger{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
.btn-success{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,0.3);}
.btn-full{width:100%;}
.btn-sm{padding:6px 11px;font-size:12px;}

/* SEARCH */
.search-bar{margin:0 16px 14px;position:relative;}
.search-bar input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px 11px 40px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color 0.2s;}
.search-bar input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;}

/* LIST */
.list-item{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;}
.list-item:last-child{border-bottom:none;}
.list-item:active{background:var(--bg3);}
.item-avatar{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;font-family:var(--font-cond);}
.item-info{flex:1;min-width:0;}
.item-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-sub{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;}

/* BADGES */
.badge-green{background:var(--green-dim);color:var(--green);}
.badge-red{background:var(--red-dim);color:var(--red);}
.badge-blue{background:var(--blue-dim);color:var(--blue);}
.badge-amber{background:var(--accent-dim);color:var(--accent);}
.badge-purple{background:var(--purple-dim);color:var(--purple);}
.badge-cyan{background:var(--cyan-dim);color:var(--cyan);}
.badge-orange{background:var(--orange-dim);color:var(--orange);}
.badge-gray{background:var(--bg3);color:var(--text3);}

/* FAB */
.fab{position:fixed;bottom:86px;right:16px;z-index:150;width:52px;height:52px;border-radius:16px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(245,158,11,0.4);font-size:24px;color:#000;transition:transform 0.2s;}
.fab:active{transform:scale(0.93);}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.72);backdrop-filter:blur(4px);display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.22s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{width:100%;max-height:92vh;background:var(--bg2);border-radius:24px 24px 0 0;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.modal-header{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:var(--font-cond);font-size:20px;font-weight:800;}
.modal-close{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text2);}
.modal-body{padding:0 18px 28px;}

/* TABS */
.tabs{display:flex;gap:4px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;background:var(--bg3);border:1px solid var(--border);color:var(--text3);cursor:pointer;transition:all 0.2s;}
.tab.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);}

/* TOGGLE */
.toggle{position:relative;width:46px;height:26px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--bg3);border:1px solid var(--border);border-radius:13px;transition:0.3s;cursor:pointer;}
.toggle-slider::before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:var(--text3);border-radius:50%;transition:0.3s;}
.toggle input:checked+.toggle-slider{background:var(--accent);border-color:var(--accent);}
.toggle input:checked+.toggle-slider::before{transform:translateX(20px);background:#000;}

/* PROGRESS */
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width 0.6s;}

/* MISC */
.px{padding:0 16px;}
.mb-10{margin-bottom:10px;}
.mb-16{margin-bottom:16px;}
.flex-between{display:flex;align-items:center;justify-content:space-between;}
.flex-gap{display:flex;align-items:center;gap:8px;}
.text-muted{color:var(--text3);font-size:13px;}
.text-sm{font-size:13px;}
.text-green{color:var(--green);}
.text-red{color:var(--red);}
.text-accent{color:var(--accent);}
.text-blue{color:var(--blue);}
.text-cyan{color:var(--cyan);}
.fw-700{font-weight:700;}
.fw-600{font-weight:600;}
.font-cond{font-family:var(--font-cond);}
.section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);padding:10px 16px 6px;}

/* CHART */
.chart-bar-container{display:flex;align-items:flex-end;gap:5px;height:90px;padding:0 4px 8px;}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.chart-bar{width:100%;border-radius:4px 4px 0 0;transition:height 0.6s;}
.chart-bar-label{font-size:9px;color:var(--text3);font-weight:600;}
.chart-bar-val{font-size:9px;font-weight:700;}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border);}
.info-cell{background:var(--card);padding:13px 16px;}
.info-cell-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.info-cell-value{font-size:15px;font-weight:700;}

/* SALARY */
.salary-summary{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);margin:0 16px 16px;overflow:hidden;}
.salary-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);}
.salary-row:last-child{border-bottom:none;background:var(--accent-dim);}

/* INVOICE */
.invoice-preview{background:#fff;color:#111;border-radius:var(--radius);padding:22px;font-family:var(--font);margin-bottom:14px;}
.inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.inv-company{font-family:var(--font-cond);font-size:19px;font-weight:800;color:#000;letter-spacing:0.5px;}
.inv-sub{font-size:11px;color:#666;margin-top:2px;}
.inv-title{font-family:var(--font-cond);font-size:24px;font-weight:900;color:var(--accent);text-align:right;}
.inv-nr{font-size:11px;color:#666;text-align:right;margin-top:2px;}
.inv-divider{height:2px;background:linear-gradient(90deg,var(--accent),transparent);margin:12px 0;}
.inv-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:#999;margin-bottom:3px;}
.inv-value{font-size:13px;font-weight:600;color:#111;}
.inv-table{width:100%;border-collapse:collapse;font-size:11px;}
.inv-table th{background:#f5f5f5;padding:7px 8px;text-align:left;font-weight:700;font-size:10px;text-transform:uppercase;color:#555;}
.inv-table td{padding:7px 8px;border-bottom:1px solid #eee;color:#333;}
.inv-table .tr{text-align:right;}
.inv-total-row{background:#fff8e7;font-weight:700;color:#000;}
.inv-footer{margin-top:16px;padding-top:10px;border-top:1px solid #eee;font-size:10px;color:#888;text-align:center;}

/* PONTAJ */
.pontaj-day{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);}

/* TOAST */
.toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-120px);z-index:500;background:var(--green);color:#000;padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);white-space:nowrap;box-shadow:var(--shadow);}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);color:#fff;}
.toast.info{background:var(--blue);color:#fff;}

/* MENU GRID */
.menu-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px;}
.menu-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 10px;text-align:center;cursor:pointer;transition:all 0.2s;}
.menu-card:active{transform:scale(0.97);border-color:var(--accent);}
.menu-card-icon{font-size:26px;margin-bottom:8px;}
.menu-card-label{font-size:12px;font-weight:700;color:var(--text2);}

/* PROJECT CARD */
.project-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin:0 16px 12px;overflow:hidden;cursor:pointer;}
.project-card:active{border-color:var(--accent);}
.project-header{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.project-name{font-size:16px;font-weight:800;font-family:var(--font-cond);letter-spacing:0.3px;}
.project-client{font-size:12px;color:var(--text3);margin-top:2px;}
.project-footer{padding:10px 16px 14px;border-top:1px solid var(--border);background:rgba(0,0,0,0.1);}
.phase-bar{display:flex;gap:4px;margin-bottom:8px;}
.phase-dot{flex:1;height:5px;border-radius:3px;background:var(--bg3);}
.phase-dot.done{background:var(--green);}
.phase-dot.active{background:var(--accent);}

/* STOCK */
.stock-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);}
.stock-qty{text-align:right;flex-shrink:0;}
.stock-low{color:var(--red);}

/* EXPENSE */
.expense-item{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);}

/* REPORT CARD */
.report-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin:0 16px 12px;}
.report-value{font-family:var(--font-cond);font-size:30px;font-weight:900;line-height:1;}
.report-label{font-size:12px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-top:4px;}

/* DETAIL HEADER */
.detail-header{background:linear-gradient(135deg,var(--bg2) 0%,var(--card) 100%);padding:18px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);}
.detail-avatar{width:58px;height:58px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;font-family:var(--font-cond);}
.detail-name{font-family:var(--font-cond);font-size:22px;font-weight:800;}
.detail-role{font-size:13px;color:var(--text3);margin-top:2px;}

/* MINI STAT ROW */
.mini-stat-row{display:flex;gap:8px;padding:0 16px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.mini-stat-row::-webkit-scrollbar{display:none;}
.mini-stat{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;min-width:100px;}
.mini-stat-val{font-family:var(--font-cond);font-size:20px;font-weight:800;}
.mini-stat-lbl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;margin-top:3px;}

/* ACTION ROW */
.action-row{display:flex;gap:8px;padding:12px 16px;}

/* ===== AUTH SYSTEM ===== */
#auth-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;animation:fadeIn 0.3s ease;}
#auth-screen.hidden{display:none;}
.auth-logo{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:32px;}
.auth-logo-icon{width:72px;height:72px;background:var(--accent);border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:900;color:#000;font-family:var(--font-cond);box-shadow:0 8px 32px rgba(245,158,11,0.35);}
.auth-logo-name{font-family:var(--font-cond);font-size:24px;font-weight:800;letter-spacing:0.5px;text-align:center;}
.auth-logo-sub{font-size:12px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;}
.auth-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;box-shadow:0 16px 48px rgba(0,0,0,0.4);}
.auth-title{font-family:var(--font-cond);font-size:20px;font-weight:800;margin-bottom:4px;}
.auth-sub{font-size:13px;color:var(--text3);margin-bottom:20px;}
.auth-footer{margin-top:16px;text-align:center;font-size:12px;color:var(--text3);}

/* ROLE BADGE */
.role-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.role-admin{background:rgba(245,158,11,0.15);color:var(--accent);border:1px solid rgba(245,158,11,0.3);}
.role-manager{background:rgba(59,130,246,0.15);color:var(--blue);border:1px solid rgba(59,130,246,0.3);}
.role-angajat{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.3);}

/* EMPLOYEE PORTAL */
#employee-portal{position:fixed;inset:0;z-index:500;background:var(--bg);display:none;flex-direction:column;}
#employee-portal.visible{display:flex;}
.emp-portal-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;}
.emp-portal-content{flex:1;overflow-y:auto;padding-bottom:76px;}
.emp-portal-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;padding:0 4px;padding-bottom:env(safe-area-inset-bottom);}

/* REQUEST CARD */
.req-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin:0 16px 12px;overflow:hidden;}
.req-card-header{padding:14px 16px;display:flex;align-items:flex-start;justify-cont
